name: CI

on: 
  push:
    branches: [main, mvp1]
  pull_request:
    branches: [main, mvp1]

jobs:
  test-api:
    name: API Server Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api-server/package-lock.json
      - name: Install dependencies
        working-directory: api-server
        run: npm ci
      - name: Run tests
        working-directory: api-server
        run: npm test

  test-engine:
    name: Processing Engine Tests (pytest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: processing-engine/requirements.txt
      - name: Install dependencies
        working-directory: processing-engine
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: processing-engine
        run: python -m pytest -v
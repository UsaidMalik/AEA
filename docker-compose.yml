services:
  mongo:
    image: mongo:7
    container_name: aea-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: aea
      MONGO_INITDB_ROOT_PASSWORD: aea_dev_pwd
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: aea-mongo-express
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: aea
      ME_CONFIG_MONGODB_ADMINPASSWORD: aea_dev_pwd
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: aea
      ME_CONFIG_BASICAUTH_PASSWORD: aea_dev_pwd

volumes:
  mongo_data:
